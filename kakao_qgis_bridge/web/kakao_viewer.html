<!doctype html>
<html lang="ko" class="centered-viewer">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kakao Map Viewer</title>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f4;
      color: #1f2428;
    }

    #viewer {
      display: grid;
      --split-primary-size: 50%;
      grid-template-rows:
        auto
        minmax(0, var(--split-primary-size))
        10px
        minmax(0, 1fr)
        auto;
      grid-template-columns: minmax(0, 1fr);
      height: 100%;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    #viewer.layout-map-top {
      grid-template-rows:
        auto
        minmax(0, var(--split-primary-size))
        10px
        minmax(0, 1fr)
        auto;
      grid-template-columns: minmax(0, 1fr);
    }

    #viewer.layout-roadview-top {
      grid-template-rows:
        auto
        minmax(0, var(--split-primary-size))
        10px
        minmax(0, 1fr)
        auto;
      grid-template-columns: minmax(0, 1fr);
    }

    #viewer.layout-map-left,
    #viewer.layout-roadview-left {
      grid-template-rows: auto minmax(0, 1fr) auto;
      grid-template-columns:
        minmax(240px, var(--split-primary-size))
        10px
        minmax(240px, 1fr);
    }

    #search-panel,
    #status-bar {
      grid-column: 1 / -1;
    }

    #viewer.layout-map-top #map,
    #viewer.layout-roadview-top #roadview {
      grid-row: 2;
    }

    #viewer.layout-map-top #roadview,
    #viewer.layout-roadview-top #map {
      grid-row: 4;
    }

    #view-splitter {
      grid-row: 3;
      grid-column: 1;
    }

    #viewer.layout-map-left #map,
    #viewer.layout-roadview-left #roadview {
      grid-row: 2;
      grid-column: 1;
    }

    #viewer.layout-map-left #roadview,
    #viewer.layout-roadview-left #map {
      grid-row: 2;
      grid-column: 3;
    }

    #viewer.layout-map-left #view-splitter,
    #viewer.layout-roadview-left #view-splitter {
      grid-row: 2;
      grid-column: 2;
    }

    #view-splitter {
      position: relative;
      z-index: 15;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: inset 0 0 0 1px rgba(31, 36, 40, 0.08);
      touch-action: none;
    }

    #viewer.layout-map-top #view-splitter,
    #viewer.layout-roadview-top #view-splitter {
      cursor: row-resize;
    }

    #viewer.layout-map-left #view-splitter,
    #viewer.layout-roadview-left #view-splitter {
      cursor: col-resize;
    }

    #split-toggle {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(70, 83, 93, 0.35);
      border-radius: 999px;
      background: #ffffff;
      color: #263238;
      font: inherit;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 2px 8px rgba(31, 36, 40, 0.16);
      cursor: pointer;
    }

    #split-toggle:hover {
      background: #f3f6f8;
    }

    html.centered-viewer,
    html.centered-viewer body {
      min-height: 100%;
      background: #e6e8ea;
    }

    html.centered-viewer #viewer {
      width: min(100vw, 1280px);
      height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background: #f7f7f4;
      box-shadow: 0 0 0 1px rgba(31, 36, 40, 0.08),
        0 18px 42px rgba(31, 36, 40, 0.18);
    }

    @media (min-width: 1440px) {
      html.centered-viewer #viewer {
        width: min(74vw, 1320px);
      }
    }

    #search-panel {
      position: relative;
      z-index: 20;
      padding: 7px 8px;
      border-bottom: 1px solid #d7d7d0;
      background: #ffffff;
    }

    #search-form {
      display: grid;
      grid-template-areas: "query submit layout fullscreen clear";
      grid-template-columns: minmax(0, 1fr) auto auto 34px 34px;
      gap: 6px;
    }

    #search-query {
      grid-area: query;
      min-width: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid #aeb4b8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 13px;
    }

    #search-query:focus {
      border-color: #4b77be;
      outline: 2px solid rgba(75, 119, 190, 0.2);
      outline-offset: 0;
    }

    #viewer-layout,
    #fullscreen-toggle,
    #search-submit,
    #search-clear {
      height: 34px;
      border: 1px solid #90979c;
      border-radius: 6px;
      background: #f3f4f4;
      color: #1f2428;
      font: inherit;
      cursor: pointer;
    }

    #viewer-layout {
      grid-area: layout;
      min-width: 120px;
      max-width: 100%;
      padding: 0 8px;
      background: #ffffff;
      font-size: 12px;
    }

    #search-submit {
      grid-area: submit;
      min-width: 54px;
      padding: 0 12px;
      background: #ffffff;
      font-size: 13px;
      font-weight: 600;
    }

    #search-clear {
      grid-area: clear;
      width: 34px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    #fullscreen-toggle {
      grid-area: fullscreen;
      width: 34px;
      padding: 0;
      font-size: 17px;
      line-height: 1;
    }

    #viewer-layout:hover,
    #fullscreen-toggle:hover,
    #search-submit:hover,
    #search-clear:hover {
      background: #e8eaeb;
    }

    #search-submit:disabled,
    #search-clear:disabled,
    #search-query:disabled {
      cursor: default;
      opacity: 0.55;
    }

    #search-results {
      position: absolute;
      top: calc(100% - 1px);
      right: 8px;
      left: 8px;
      max-height: min(42vh, 320px);
      overflow-y: auto;
      border: 1px solid #aeb4b8;
      border-radius: 0 0 6px 6px;
      background: #ffffff;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.16);
    }

    #search-results[hidden] {
      display: none;
    }

    #route-controls {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 6px;
      margin-top: 6px;
    }

    .route-label {
      align-self: center;
      min-width: 34px;
      color: #4c555a;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    .route-input {
      min-width: 0;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #aeb4b8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 12px;
    }

    .route-input:focus {
      border-color: #4b77be;
      outline: 2px solid rgba(75, 119, 190, 0.2);
      outline-offset: 0;
    }

    #route-options,
    .route-waypoint {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 6px;
    }

    #route-options {
      grid-template-columns: auto minmax(0, 1fr) auto auto auto;
    }

    #route-avoid-options {
      display: flex;
      grid-column: 1 / -1;
      flex-wrap: wrap;
      gap: 4px 12px;
      padding: 4px 6px 5px 40px;
      border-bottom: 1px solid #e3e5e6;
    }

    #route-avoid-options[hidden] {
      display: none;
    }

    #route-vehicle-options {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: auto minmax(92px, 1fr) auto minmax(76px, 1fr) auto;
      align-items: center;
      gap: 6px;
      padding: 4px 6px 5px 40px;
      border-bottom: 1px solid #e3e5e6;
    }

    #route-vehicle-options[hidden] {
      display: none;
    }

    .route-vehicle-label {
      color: #4c555a;
      font-size: 11px;
      font-weight: 600;
    }

    .route-avoid-option {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      gap: 5px;
      color: #3f474c;
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
    }

    .route-avoid-option input {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: #2b5f9e;
    }

    #route-priority,
    #route-car-type,
    #route-car-fuel {
      min-width: 0;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #aeb4b8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 12px;
    }

    #route-priority:focus,
    #route-car-type:focus,
    #route-car-fuel:focus {
      border-color: #4b77be;
      outline: 2px solid rgba(75, 119, 190, 0.2);
      outline-offset: 0;
    }

    #route-waypoints {
      display: grid;
      grid-column: 1 / -1;
      gap: 6px;
    }

    .route-waypoint {
      grid-template-columns: auto minmax(0, 1fr) auto auto 32px;
    }

    .route-waypoint-order {
      display: grid;
      grid-template-columns: 28px 28px;
      gap: 2px;
    }

    .route-waypoint-order button {
      width: 28px;
      padding: 0 !important;
      font-size: 16px !important;
    }

    .route-waypoint-remove {
      width: 32px;
      padding: 0 !important;
      font-size: 18px !important;
    }

    #route-controls button,
    #route-actions button {
      min-width: 0;
      height: 32px;
      overflow: hidden;
      padding: 0 8px;
      border: 1px solid #aeb4b8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    #route-controls button:hover,
    #route-actions button:hover {
      background: #edf2f7;
    }

    #route-controls button:disabled,
    #route-actions button:disabled,
    .route-input:disabled,
    #route-priority:disabled,
    #route-car-type:disabled,
    #route-car-fuel:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #route-actions {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: minmax(0, 1fr) 88px 34px 34px;
      gap: 6px;
    }

    #route-create {
      border-color: #2b5f9e !important;
      background: #2b5f9e !important;
      color: #ffffff !important;
    }

    #route-history-open,
    #route-swap,
    #route-reset {
      padding: 0 !important;
    }

    #route-swap,
    #route-reset {
      width: 34px;
      font-size: 18px !important;
    }

    #route-guidance-panel {
      margin: 7px -8px -7px;
      border-top: 1px solid #d7d7d0;
      background: #ffffff;
    }

    #route-guidance-panel[hidden] {
      display: none;
    }

    #route-guidance-summary {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: 8px;
      padding: 5px 8px 5px 12px;
      border-bottom: 1px solid #e3e5e6;
    }

    #route-panel-tabs {
      display: inline-flex;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid #c6ccd1;
      border-radius: 6px;
      background: #f8f9fa;
    }

    .route-panel-tab {
      min-width: 48px;
      height: 28px;
      padding: 0 8px;
      border: 0;
      border-right: 1px solid #c6ccd1;
      background: transparent;
      color: #3f474d;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    .route-panel-tab:last-child {
      border-right: 0;
    }

    .route-panel-tab.is-active {
      background: #2b5f9e;
      color: #ffffff;
      font-weight: 600;
    }

    #route-guidance-summary-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      font-size: 12px;
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #route-guidance-toggle {
      width: 30px;
      height: 30px;
      padding: 0;
      border: 1px solid #aeb4b8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 18px;
      cursor: pointer;
    }

    #route-guidance-list,
    #route-history-list {
      max-height: min(28vh, 260px);
      overflow-y: auto;
    }

    #route-guidance-overview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid #e3e5e6;
      background: #f8fafb;
    }

    .route-overview-point {
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 5px;
      padding: 4px 7px;
      border: 1px solid #d4d9de;
      border-radius: 999px;
      background: #ffffff;
      color: #1f2428;
      font-size: 11px;
      line-height: 1.25;
    }

    .route-overview-role {
      flex: 0 0 auto;
      font-weight: 700;
    }

    .route-overview-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #route-guidance-panel[data-collapsed="true"] #route-guidance-list,
    #route-guidance-panel[data-collapsed="true"] #route-guidance-overview,
    #route-guidance-panel[data-collapsed="true"] #route-history-list,
    #route-guidance-list[hidden],
    #route-guidance-overview[hidden],
    #route-history-list[hidden] {
      display: none;
    }

    .guidance-item,
    .history-item {
      display: grid;
      width: 100%;
      min-height: 54px;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 0;
      border-bottom: 1px solid #eceeed;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .guidance-item {
      grid-template-columns: 30px 28px minmax(0, 1fr);
    }

    .history-item {
      grid-template-columns: 26px minmax(0, 1fr);
    }

    .history-bulk-actions {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid #e3e5e6;
      background: #f8fafb;
    }

    .history-bulk-summary {
      flex: 1;
      min-width: 0;
      color: #3f474d;
      font-size: 12px;
      font-weight: 600;
    }

    .history-select {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #2b5f9e;
      cursor: pointer;
    }

    .history-actions {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }

    .history-bulk-actions button,
    .history-actions button {
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid #b8c1c8;
      border-radius: 6px;
      background: #ffffff;
      color: #1f2428;
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .history-bulk-actions button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    .history-content {
      min-width: 0;
    }

    .history-actions button:hover,
    .history-actions button:focus {
      border-color: #2b5f9e;
      color: #174d86;
      outline: none;
    }

    .guidance-item:hover,
    .guidance-item:focus,
    .guidance-item.is-active,
    .history-item:hover,
    .history-item:focus,
    .history-item.is-active {
      background: #edf4fc;
      outline: none;
    }

    .guidance-sequence {
      color: #727a7f;
      font-size: 11px;
      text-align: center;
    }

    .guidance-icon {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border: 2px solid #1976d2;
      border-radius: 50%;
      color: #185aa8;
      font-size: 17px;
      font-weight: 700;
      line-height: 1;
    }

    .guidance-icon.start,
    .guidance-icon.destination,
    .guidance-icon.waypoint {
      border: 0;
      color: #ffffff;
      font-size: 11px;
    }

    .guidance-icon.start {
      background: #2e7d32;
    }

    .guidance-icon.destination {
      background: #d32f2f;
    }

    .guidance-icon.waypoint {
      background: #f9a825;
    }

    .guidance-copy {
      min-width: 0;
    }

    .guidance-title,
    .guidance-meta,
    .history-title,
    .history-meta {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .guidance-title,
    .history-title {
      font-size: 12px;
      font-weight: 600;
    }

    .guidance-meta,
    .history-meta {
      margin-top: 3px;
      color: #687176;
      font-size: 11px;
    }

    .history-empty {
      padding: 12px;
      color: #687176;
      font-size: 12px;
    }

    .search-result {
      display: block;
      width: 100%;
      padding: 9px 10px;
      border: 0;
      border-bottom: 1px solid #e3e5e6;
      background: #ffffff;
      color: #1f2428;
      text-align: left;
      cursor: pointer;
    }

    .search-result:last-child {
      border-bottom: 0;
    }

    .search-result:hover,
    .search-result:focus {
      background: #f2f6fb;
      outline: none;
    }

    .search-result-title,
    .search-result-address {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search-result-title {
      font-size: 13px;
      font-weight: 600;
    }

    .search-result-address {
      margin-top: 3px;
      color: #626b70;
      font-size: 11px;
    }

    .search-empty {
      padding: 14px 10px;
      color: #626b70;
      font-size: 12px;
      text-align: center;
    }

    #map,
    #roadview {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    #status-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-height: 0;
      padding: 5px 8px 5px 10px;
      border-top: 1px solid #d7d7d0;
      background: #ffffff;
    }

    #status {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #open-history,
    #open-external-viewer {
      flex: 0 0 auto;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      cursor: pointer;
    }

    #open-external-viewer {
      border: 1px solid #aeb4b8;
      background: #ffffff;
      color: #1f2428;
    }

    #open-external-viewer:hover {
      background: #edf2f7;
    }

    #open-history {
      border: 1px solid #c7a600;
      background: #fee500;
      color: #191919;
    }

    #open-history:hover {
      background: #f4dc00;
    }

    #open-history:disabled,
    #open-external-viewer:disabled {
      cursor: default;
      opacity: 0.5;
    }

    @media (max-width: 980px) {
      #viewer.layout-map-left,
      #viewer.layout-roadview-left {
        grid-template-rows:
          auto
          minmax(0, var(--split-primary-size))
          10px
          minmax(0, 1fr)
          auto;
        grid-template-columns: minmax(0, 1fr);
      }

      #viewer.layout-map-left #map,
      #viewer.layout-roadview-left #roadview {
        grid-row: 2;
        grid-column: 1;
      }

      #viewer.layout-map-left #roadview,
      #viewer.layout-roadview-left #map {
        grid-row: 4;
        grid-column: 1;
      }

      #viewer.layout-map-left #view-splitter,
      #viewer.layout-roadview-left #view-splitter {
        grid-row: 3;
        grid-column: 1;
        cursor: row-resize;
      }

      #search-form {
        grid-template-areas:
          "query submit fullscreen clear"
          "layout layout layout layout";
        grid-template-columns: minmax(0, 1fr) 58px 34px 34px;
      }

      #viewer-layout {
        width: 100%;
      }

      #route-options {
        grid-template-columns: auto minmax(0, 1fr) auto auto;
      }

      #route-add-waypoint {
        grid-column: 2 / -1;
      }

      #route-vehicle-options {
        grid-template-columns: auto minmax(0, 1fr);
      }
    }

    @media (max-width: 760px) {
      #status {
        flex-basis: 100%;
      }
    }

    @media (max-width: 420px) {
      #status-bar {
        align-items: stretch;
        flex-direction: column;
      }

      #route-controls,
      .route-waypoint {
        grid-template-columns: auto minmax(0, 1fr);
      }

      #route-origin-current,
      #route-destination-current,
      #route-actions {
        grid-column: 2;
      }

      #open-history,
      #open-external-viewer {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main id="viewer" class="layout-map-top">
    <header id="search-panel">
      <form id="search-form" role="search">
        <input id="search-query" type="search" aria-label="주소 또는 장소 검색" placeholder="주소 또는 장소 검색" autocomplete="off" disabled>
        <button id="search-submit" type="submit" disabled>검색</button>
        <select id="viewer-layout" aria-label="지도와 로드뷰 배치">
          <option value="map-top">지도 위 / 로드뷰 아래</option>

      <div id="route-controls" aria-label="경로 탐색">

          <button id="route-add-waypoint" type="button" title="경유지 추가" disabled>+ 경유지</button>
        </div>
        <div id="route-avoid-options" aria-label="경로 회피 옵션" hidden>
          <label class="route-avoid-option"><input type="checkbox" value="toll">유료도로</label>
          <label class="route-avoid-option"><input type="checkbox" value="motorway">자동차전용도로</label>
          <label class="route-avoid-option"><input type="checkbox" value="ferries">페리</label>
          <label class="route-avoid-option"><input type="checkbox" value="schoolzone">어린이보호구역</label>
          <label class="route-avoid-option"><input type="checkbox" value="uturn">유턴</label>
        </div>
        <div id="route-vehicle-options" aria-label="차량 설정" hidden>
          <label class="route-vehicle-label" for="route-car-type">차종</label>

            <option value="1">소형</option>
            <option value="2">중형</option>
            <option value="3">대형</option>
            <option value="4">대형 화물</option>

            <option value="6">경차</option>

          <label class="route-vehicle-label" for="route-car-fuel">유종</label>
          <select id="route-car-fuel">
            <option value="GASOLINE">휘발유</option>

          </select>
          <label class="route-avoid-option"><input id="route-car-hipass" type="checkbox">하이패스</label>

        <button id="route-origin-current" class="route-current" type="button" title="현재 지도 중심을 출발지로 사용" disabled>현재 위치</button>

        <button id="route-destination-current" class="route-current" type="button" title="현재 지도 중심을 도착지로 사용" disabled>현재 위치</button>
